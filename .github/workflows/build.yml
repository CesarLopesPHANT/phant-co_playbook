name: Build (patch index + vite)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Ajusta index.html para garantir que exista o entry script
      - name: Patch index.html (ensure entry)
        run: |
          node - <<'NODE'
          const fs = require('fs');

          const p = 'index.html';
          if (!fs.existsSync(p)) {
            console.log('index.html not found; skipping patch.');
            process.exit(0);
          }

          let html = fs.readFileSync(p, 'utf8');

          // Remove importmap (opcional, mas recomendado se seu app é Vite/React)
          html = html.replace(/<script\s+type="importmap">[\s\S]*?<\/script>\s*/g, '');

          // Garante container root
          if (!html.includes('id="root"')) {
            html = html.replace(/<body[^>]*>/i, (m) => `${m}\n  <div id="root"></div>`);
          }

          // Garante entry script (ajuste se seu entry for diferente)
          const entry = '<script type="module" src="/index.tsx"></script>';
          if (!html.includes('src="/index.tsx"')) {
            html = html.replace(/<\/body>/i, `  ${entry}\n</body>`);
          }

          fs.writeFileSync(p, html);
          console.log('index.html patched.');
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
