
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhantLab | Sales Interface</title>
    <link rel="icon" type="image/png" href="http://phant.com.br/uploads/simbolo_roxo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        window.global = window;
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }
        
        ::-webkit-scrollbar { width: 0px; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .proposal-preview-area section.printable-page {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
            transition: transform 0.3s ease;
        }

        /* 
           =============================================================================
           PHANT PDF PROTOCOL - DO NOT MODIFY (PROTOCOLOS DE INTEGRIDADE ESTRUTURAL)
           Este bloco garante que o layout A4 permaneça imutável independente da UI.
           =============================================================================
        */
        @media print {
            @page {
                size: A4;
                margin: 0 !important;
            }
            
            /* Isolamento Radical: Esconde a UI e preserva apenas o container da proposta */
            html, body {
                height: auto !important;
                overflow: visible !important;
                background: white !important;
            }

            #root > *, .no-print, aside, nav, button {
                display: none !important;
            }

            /* Container de Impressão Phant - Trava de Dimensão */
            .proposal-integrity-container {
                display: block !important;
                width: 210mm !important;
                margin: 0 !important;
                padding: 0 !important;
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                transform: none !important;
                overflow: visible !important;
            }

            section.printable-page {
                display: block !important;
                width: 210mm !important;
                height: 297mm !important;
                min-height: 297mm !important;
                max-height: 297mm !important;
                padding: 20mm !important;
                margin: 0 !important;
                page-break-after: always !important;
                page-break-inside: avoid !important;
                background-color: white !important;
                box-sizing: border-box !important;
                position: relative !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            section.printable-page.bg-black {
                background-color: black !important;
                color: white !important;
            }
            
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
        /* ============================================================================= */
    </style>
