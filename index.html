
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhantLab | Sales Interface</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🟣</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }
        
        ::-webkit-scrollbar { width: 0px; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .proposal-preview-area section.printable-page {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
            transition: transform 0.3s ease;
        }

        /* UTILITÁRIOS DE QUEBRA DE PÁGINA */
        .html2pdf__page-break {
            height: 0;
            page-break-before: always;
            margin: 0 !important;
            padding: 0 !important;
            display: block;
        }

        .keep-together {
            page-break-inside: avoid;
            break-inside: avoid;
        }

        /* PLUGIN DE IMPRESSÃO PHANT - ISOLAMENTO RADICAL */
        @media print {
            @page {
                size: A4;
                margin: 15mm; /* Margem de segurança física */
            }
            
            html, body, #root, #root > div, main, aside, nav, footer, button, .no-print {
                display: none !important;
                height: auto !important;
                overflow: visible !important;
            }

            html, body, #root, #root > div, main, 
            .proposal-preview-area, 
            .proposal-container,
            .proposal-container *,
            section.printable-page,
            section.printable-page * {
                display: block !important;
                visibility: visible !important;
                position: static !important;
                width: auto !important;
                height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                background: none !important;
                box-shadow: none !important;
                border: none !important;
                overflow: visible !important;
            }

            .proposal-container {
                width: 100% !important;
                transform: none !important;
                margin: 0 auto !important;
            }

            section.printable-page {
                display: block !important;
                width: 100% !important;
                height: auto !important; /* IMPORTANTE: Altura automática para fluxo */
                min-height: auto !important;
                padding: 0 !important;
                page-break-after: always !important;
                page-break-inside: avoid !important;
                position: relative !important;
                background-color: white !important;
            }

            section.printable-page.bg-black {
                background-color: black !important;
                color: white !important;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",

    "mammoth": "https://esm.sh/mammoth@1.6.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.89.0"
  }
}
</script>
</head>

    <div id="root"></div>

</body>
</html>
