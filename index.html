
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhantLab | Sales Interface</title>
    <link rel="icon" type="image/png" href="https://phant.com.br/uploads/simbolo_roxo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }
        
        ::-webkit-scrollbar { width: 0px; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .proposal-preview-area section.printable-page {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
            transition: transform 0.3s ease;
        }

        /* PLUGIN DE IMPRESSÃO PHANT - ISOLAMENTO RADICAL */
        @media print {
            @page {
                size: A4;
                margin: 0;
            }
            
            /* 1. Esconde absolutamente tudo por padrão */
            html, body, #root, #root > div, main, aside, nav, footer, button, .no-print {
                display: none !important;
                height: auto !important;
                overflow: visible !important;
            }

            /* 2. Habilita apenas o caminho até a proposta */
            html, body, #root, #root > div, main, 
            .proposal-preview-area, 
            .proposal-container,
            .proposal-container *,
            section.printable-page,
            section.printable-page * {
                display: block !important;
                visibility: visible !important;
                position: static !important;
                width: auto !important;
                height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                background: none !important;
                box-shadow: none !important;
                border: none !important;
                overflow: visible !important;
            }

            /* 3. Força o tamanho real A4 no container da proposta */
            .proposal-container {
                width: 210mm !important;
                transform: none !important; /* Remove o zoom da UI */
                margin: 0 auto !important;
            }

            /* 4. Estilização das páginas físicas */
            section.printable-page {
                display: flex !important;
                flex-direction: column !important;
                width: 210mm !important;
                height: 297mm !important;
                padding: 20mm !important;
                page-break-after: always !important;
                page-break-inside: avoid !important;
                position: relative !important;
                background-color: white !important;
                box-sizing: border-box !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* Especial para fundos escuros */
            section.printable-page.bg-black {
                background-color: black !important;
                color: white !important;
            }

            /* Garante que imagens e fundos apareçam */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
<script type="importmap">
